<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Dashboard TRS Industriel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
font-size:30px;
margin:0;
}

.buttons{
text-align:center;
margin-bottom:25px;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:6px;
background:#2c7be5;
color:white;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#1a5dcc;
}

.chart{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

</style>

</head>

<body>

<h1>Dashboard TRS – Performance Industrielle</h1>

<div class="buttons">

<button onclick="exportExcel()">Exporter vers Excel</button>
<button onclick="exportCSV()">Exporter CSV</button>

</div>

<div class="grid">

<div class="card">
<h2 id="trs"></h2>
<p>TRS moyen</p>
</div>

<div class="card">
<h2 id="disp"></h2>
<p>Disponibilité</p>
</div>

<div class="card">
<h2 id="perf"></h2>
<p>Performance</p>
</div>

<div class="card">
<h2 id="qual"></h2>
<p>Qualité</p>
</div>

<div class="card">
<h2>85%</h2>
<p>Objectif TRS</p>
</div>

</div>

<div class="chart">
<canvas id="trsChart"></canvas>
</div>

<div class="chart">
<canvas id="dpqChart"></canvas>
</div>

<h2>Données TRS</h2>

<table id="dataTable">
<thead>
<tr>
<th>Jour</th>
<th>TRS %</th>
<th>Disponibilité</th>
<th>Performance</th>
<th>Qualité</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const trs=[69.27,76.90,83.36,83.64,86.47,93.18,95.24,81.15,85.88,83.20,
76.64,79.85,75.82,79.87,81.25,79.73,72.55,83.64,83.89,88.84,
84.97,75.36,73.31,82.79,79.38,76.50,72.52,71.69,84.00,76.48,73.28];

const disp=[87.50,98.96,94.38,91.88,95.42,99.17,99.17,95.00,90.00,93.75,
90.83,91.04,88.13,99.58,100.00,98.13,94.38,90.83,86.04,92.50,
98.75,83.54,90.00,98.13,100.00,97.92,90.42,92.50,93.33,94.38,83.75];

const perf=[83.33,80.42,91.88,93.75,92.29,96.67,97.08,87.50,96.67,93.54,
84.58,89.79,86.88,81.67,83.33,81.46,81.46,93.54,98.13,96.88,
87.71,94.17,84.79,89.17,81.67,82.29,80.42,81.88,93.75,82.71,90.63];

const qual=[95.00,96.63,96.15,97.11,98.19,97.20,98.93,97.62,98.71,94.88,
99.75,97.68,99.04,98.21,97.50,99.74,94.37,98.44,99.36,99.14,
98.10,95.80,96.07,94.63,97.19,94.94,99.74,94.66,96.00,97.98,96.55];

function avg(arr){
return (arr.reduce((a,b)=>a+b)/arr.length).toFixed(1)
}

document.getElementById("trs").innerText=avg(trs)+" %"
document.getElementById("disp").innerText=avg(disp)+" %"
document.getElementById("perf").innerText=avg(perf)+" %"
document.getElementById("qual").innerText=avg(qual)+" %"

const labels=[...Array(31).keys()].map(x=>"Jour "+(x+1));

new Chart(document.getElementById("trsChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"TRS %",data:trs}]}
})

new Chart(document.getElementById("dpqChart"),{
type:"line",
data:{
labels:labels,
datasets:[
{label:"Disponibilité",data:disp},
{label:"Performance",data:perf},
{label:"Qualité",data:qual}
]}
})

const table=document.querySelector("#dataTable tbody")

for(let i=0;i<trs.length;i++){

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${trs[i]}</td>
<td>${disp[i]}</td>
<td>${perf[i]}</td>
<td>${qual[i]}</td>
</tr>
`
}

function exportExcel(){

let wb=XLSX.utils.table_to_book(document.getElementById("dataTable"))
XLSX.writeFile(wb,"TRS_dashboard.xlsx")

}

function exportCSV(){

let wb=XLSX.utils.table_to_book(document.getElementById("dataTable"))
XLSX.writeFile(wb,"TRS_dashboard.csv")

}

</script>

</body>
</html>
