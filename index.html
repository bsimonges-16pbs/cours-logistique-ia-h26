<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Centre de contrôle industriel TRS V16.0</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:30px;
}

h1{text-align:center}

.topbar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
margin-bottom:30px;
}

button{
padding:10px 15px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

select{
padding:8px;
border-radius:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.legend span{
margin-right:15px;
font-weight:bold;
}

.red{color:red}
.orange{color:orange}
.green{color:lime}

.machineGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.machine{
padding:20px;
border-radius:10px;
background:#1e293b;
text-align:center;
}

.ok{background:#15803d}
.warn{background:#ea580c}
.fail{background:#dc2626}

.chart{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:30px;
}

.aiBox{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
margin-top:30px;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
}

</style>

</head>

<body>

<h1>Centre de contrôle industriel – TRS</h1>

<div class="topbar">

<div>

<select>
<option>Version V16.0</option>
<option>Version V15.0</option>
<option>Version V14.0</option>
<option>Version V13.0</option>
</select>

<select>
<option>Jour</option>
<option>Semaine</option>
<option>Mois</option>
<option>Année</option>
</select>

<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportExcel()">Export Excel</button>

</div>

<div id="qrcode"></div>

</div>

<div class="legend">

<span class="red">TRS < 70%</span>
<span class="orange">70-85%</span>
<span class="green">> 85%</span>

</div>

<div class="grid">

<div class="card">
<h2 id="trs">--</h2>
TRS
</div>

<div class="card">
<h2 id="production">0</h2>
Pièces produites
</div>

<div class="card">
<h2 id="availability">--</h2>
Disponibilité
</div>

<div class="card">
<h2 id="quality">--</h2>
Qualité
</div>

</div>

<h2>Machines production</h2>

<div class="machineGrid">

<div class="machine" id="m1">Machine A<br><span id="p1">0</span></div>
<div class="machine" id="m2">Machine B<br><span id="p2">0</span></div>
<div class="machine" id="m3">Machine C<br><span id="p3">0</span></div>
<div class="machine" id="m4">Machine D<br><span id="p4">0</span></div>

</div>

<div class="aiBox">

<h3>IA maintenance prédictive</h3>

<p id="aiMachine"></p>
<p id="aiCause"></p>

<ul id="aiAction"></ul>

</div>

<div class="chart">

<canvas id="pareto"></canvas>

</div>

<div class="chart">

<canvas id="history"></canvas>

</div>

<table>

<thead>

<tr>
<th>Mois</th>
<th>TRS</th>
<th>Disponibilité</th>
<th>Qualité</th>
</tr>

</thead>

<tbody id="tableData"></tbody>

</table>

<script>

let production=[0,0,0,0]

function simulateFactory(){

let total=0

production.forEach((v,i)=>{

let machine=document.getElementById("m"+(i+1))

let r=Math.random()

machine.classList.remove("ok","warn","fail")

if(r<0.7){

machine.classList.add("ok")
production[i]+=Math.floor(Math.random()*5)

}

else if(r<0.9){

machine.classList.add("warn")
production[i]+=1

}

else{

machine.classList.add("fail")

}

document.getElementById("p"+(i+1)).innerText=production[i]

total+=production[i]

})

document.getElementById("production").innerText=total

updateTRS()

}

function updateTRS(){

let availability=(Math.random()*15+85)
let quality=(Math.random()*5+94)
let performance=(Math.random()*15+80)

let trs=(availability*quality*performance)/10000

document.getElementById("availability").innerText=availability.toFixed(1)+"%"
document.getElementById("quality").innerText=quality.toFixed(1)+"%"
document.getElementById("trs").innerText=trs.toFixed(1)+"%"

}

function predictiveAI(){

const machines=["Machine A","Machine B","Machine C","Machine D"]

const causes=[
"Surchauffe moteur",
"Vibration anormale",
"Usure roulement"
]

const actions={
"Surchauffe moteur":["Réduire cadence","Vérifier ventilation"],
"Vibration anormale":["Inspection mécanique","Contrôle alignement"],
"Usure roulement":["Lubrification","Planifier remplacement"]
}

let m=machines[Math.floor(Math.random()*machines.length)]
let c=causes[Math.floor(Math.random()*causes.length)]

document.getElementById("aiMachine").innerText="Machine à risque : "+m
document.getElementById("aiCause").innerText="Cause probable : "+c

let list=document.getElementById("aiAction")
list.innerHTML=""

actions[c].forEach(a=>list.innerHTML+="<li>"+a+"</li>")

}

function generateTable(){

for(let i=1;i<=12;i++){

let row="<tr>"

row+="<td>Mois "+i+"</td>"
row+="<td>"+(80+i/2).toFixed(1)+"%</td>"
row+="<td>"+(90+i/3).toFixed(1)+"%</td>"
row+="<td>"+(95+i/5).toFixed(1)+"%</td>"

row+="</tr>"

document.getElementById("tableData").innerHTML+=row

}

}

window.onload=function(){

generateTable()

new QRCode(document.getElementById("qrcode"),{
text:window.location.href,
width:110,
height:110
})

new Chart(document.getElementById("pareto"),{
type:"bar",
data:{
labels:["Arrêts","Micro","Vitesse","Réglage"],
datasets:[{data:[30,20,15,10]}]
}
})

new Chart(document.getElementById("history"),{
type:"line",
data:{
labels:["Jan","Fev","Mar","Avr","Mai"],
datasets:[{data:[80,82,85,87,89]}]
}
})

setInterval(simulateFactory,2000)
setInterval(predictiveAI,8000)

}

function exportCSV(){alert("Export CSV")}
function exportExcel(){alert("Export Excel")}

</script>

</body>
</html>
