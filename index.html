<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Centre de contrôle TRS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:40px;
}

h1{text-align:center}

.version{
text-align:right;
font-size:14px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.card h2{
font-size:28px;
margin:0;
}

.chart{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
text-align:center;
}

</style>

</head>

<body>

<h1>Centre de contrôle industriel – TRS</h1>

<div class="version">

Version 6.0  
Dernière mise à jour :
<span id="dateUpdate"></span>

</div>

<div class="grid">

<div class="card">
<h2 id="trs"></h2>
<p>TRS Global</p>
</div>

<div class="card">
<h2 id="disp"></h2>
<p>Disponibilité</p>
</div>

<div class="card">
<h2 id="perf"></h2>
<p>Performance</p>
</div>

<div class="card">
<h2 id="qual"></h2>
<p>Qualité</p>
</div>

<div class="card">
<h2 id="trend"></h2>
<p>Tendance TRS</p>
</div>

</div>

<div class="chart">
<h2>TRS annuel</h2>
<canvas id="trsChart"></canvas>
</div>

<div class="chart">
<h2>Disponibilité / Performance / Qualité</h2>
<canvas id="dpqChart"></canvas>
</div>

<div class="chart">
<h2>TRS par ligne</h2>
<canvas id="lineChart"></canvas>
</div>

<div class="chart">
<h2>TRS par machine</h2>
<canvas id="machineChart"></canvas>
</div>

<div class="chart">
<h2>Pareto pertes</h2>
<canvas id="paretoChart"></canvas>
</div>

<div class="chart">
<h2>TRS par quart de travail</h2>
<canvas id="shiftChart"></canvas>
</div>

<script>

document.getElementById("dateUpdate").innerText =
new Date().toLocaleDateString("fr-CA")

function random(min,max){
return Math.random()*(max-min)+min
}

let labels=[]
let trs=[]
let disp=[]
let perf=[]
let qual=[]

const months=["Jan","Fev","Mar","Avr","Mai","Jun","Jul","Aou","Sep","Oct","Nov","Dec"]

for(let m=0;m<12;m++){

for(let d=1;d<=30;d++){

labels.push(months[m]+"-"+d)

trs.push(random(70,95))
disp.push(random(85,100))
perf.push(random(80,95))
qual.push(random(94,100))

}

}

function avg(arr){

return (arr.reduce((a,b)=>a+b)/arr.length).toFixed(1)

}

function updateKPI(){

let t=avg(trs)

document.getElementById("trs").innerText=t+"%"
document.getElementById("disp").innerText=avg(disp)+"%"
document.getElementById("perf").innerText=avg(perf)+"%"
document.getElementById("qual").innerText=avg(qual)+"%"

let trend=trs[trs.length-1]-trs[trs.length-2]

document.getElementById("trend").innerText =
trend>0 ? "⬆" : "⬇"

}

updateKPI()

let trsChart=new Chart(document.getElementById("trsChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"TRS %",
data:trs
}]
}

})

let dpqChart=new Chart(document.getElementById("dpqChart"),{

type:"line",

data:{
labels:labels,
datasets:[
{label:"Disponibilité",data:disp},
{label:"Performance",data:perf},
{label:"Qualité",data:qual}
]
}

})

new Chart(document.getElementById("lineChart"),{

type:"bar",

data:{
labels:["Ligne 1","Ligne 2","Ligne 3"],
datasets:[{
label:"TRS %",
data:[
random(75,90),
random(75,90),
random(75,90)
]
}]
}

})

new Chart(document.getElementById("machineChart"),{

type:"bar",

data:{
labels:["M1","M2","M3","M4","M5","M6","M7","M8","M9"],
datasets:[{
label:"TRS %",
data:[
random(70,95),
random(70,95),
random(70,95),
random(70,95),
random(70,95),
random(70,95),
random(70,95),
random(70,95),
random(70,95)
]
}]
}

})

new Chart(document.getElementById("paretoChart"),{

type:"bar",

data:{
labels:[
"Arrêts",
"Micro-arrêts",
"Réglages",
"Vitesse réduite",
"Défauts"
],

datasets:[{
label:"Impact %",
data:[28,22,18,16,10]
}]
}

})

new Chart(document.getElementById("shiftChart"),{

type:"bar",

data:{
labels:["Jour","Soir","Nuit"],
datasets:[{
label:"TRS %",
data:[
random(80,92),
random(75,90),
random(70,88)
]
}]
}

})

function realtime(){

trs.push(random(70,95))
trs.shift()

trsChart.data.datasets[0].data=trs
trsChart.update()

updateKPI()

}

setInterval(realtime,5000)

</script>

</body>

</html>
