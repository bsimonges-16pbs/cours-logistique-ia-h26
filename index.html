<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Dashboard TRS Industriel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:40px;
}

h1{
text-align:center;
margin-bottom:5px;
}

.version{
text-align:right;
font-size:14px;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 8px 18px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
font-size:30px;
margin:0;
}

.chart{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.buttons{
text-align:center;
margin-bottom:20px;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:6px;
background:#2c7be5;
color:white;
cursor:pointer;
}

button:hover{
background:#1a5dcc;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<h1>Dashboard TRS – Performance Industrielle</h1>

<div class="version">
Version v2.0<br>
Dernière mise à jour : <span id="dateUpdate"></span>
</div>

<div style="text-align:center;margin-bottom:25px">

<label>Filtrer par semaine :</label>

<select id="weekFilter" onchange="filterWeek()">

<option value="all">Tout le mois</option>
<option value="1">Semaine 1</option>
<option value="2">Semaine 2</option>
<option value="3">Semaine 3</option>
<option value="4">Semaine 4</option>

</select>

</div>

<div class="buttons">

<button onclick="exportExcel()">Exporter Excel</button>
<button onclick="exportCSV()">Exporter CSV</button>

<input type="file" id="excelFile">

</div>

<div class="grid">

<div class="card">
<h2 id="trs"></h2>
<p>TRS</p>
</div>

<div class="card">
<h2 id="disp"></h2>
<p>Disponibilité</p>
</div>

<div class="card">
<h2 id="perf"></h2>
<p>Performance</p>
</div>

<div class="card">
<h2 id="qual"></h2>
<p>Qualité</p>
</div>

<div class="card">
<h2>85%</h2>
<p>Objectif TRS</p>
</div>

</div>

<div class="chart">
<canvas id="trsChart"></canvas>
</div>

<div class="chart">
<canvas id="dpqChart"></canvas>
</div>

<div class="chart">
<h2>Jauge TRS</h2>
<canvas id="gaugeTRS"></canvas>
</div>

<div class="chart">
<h2>Pareto des pertes</h2>
<canvas id="pareto"></canvas>
</div>

<div class="chart">
<h2>TRS par machine</h2>
<canvas id="machineChart"></canvas>
</div>

<div class="chart">
<h2>TRS par quart</h2>
<canvas id="shiftChart"></canvas>
</div>

<div class="chart">
<h2>Prévision TRS</h2>
<canvas id="forecast"></canvas>
</div>

<h2>Données TRS</h2>

<table id="dataTable">

<thead>
<tr>
<th>Jour</th>
<th>TRS</th>
<th>Disponibilité</th>
<th>Performance</th>
<th>Qualité</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

document.getElementById("dateUpdate").innerText =
new Date().toLocaleDateString("fr-CA")

const trs=[69.27,76.90,83.36,83.64,86.47,93.18,95.24,81.15,85.88,83.20,
76.64,79.85,75.82,79.87,81.25,79.73,72.55,83.64,83.89,88.84,
84.97,75.36,73.31,82.79,79.38,76.50,72.52,71.69,84.00,76.48,73.28];

const disp=[87.50,98.96,94.38,91.88,95.42,99.17,99.17,95.00,90.00,93.75,
90.83,91.04,88.13,99.58,100.00,98.13,94.38,90.83,86.04,92.50,
98.75,83.54,90.00,98.13,100.00,97.92,90.42,92.50,93.33,94.38,83.75];

const perf=[83.33,80.42,91.88,93.75,92.29,96.67,97.08,87.50,96.67,93.54,
84.58,89.79,86.88,81.67,83.33,81.46,81.46,93.54,98.13,96.88,
87.71,94.17,84.79,89.17,81.67,82.29,80.42,81.88,93.75,82.71,90.63];

const qual=[95.00,96.63,96.15,97.11,98.19,97.20,98.93,97.62,98.71,94.88,
99.75,97.68,99.04,98.21,97.50,99.74,94.37,98.44,99.36,99.14,
98.10,95.80,96.07,94.63,97.19,94.94,99.74,94.66,96.00,97.98,96.55];

const labels=[...Array(31).keys()].map(x=>"Jour "+(x+1))

function avg(arr){
return (arr.reduce((a,b)=>a+b)/arr.length).toFixed(1)
}

function colorKPI(id,value,red,orange){

let element=document.getElementById(id)

if(value<red) element.style.color="red"
else if(value<orange) element.style.color="orange"
else element.style.color="green"

}

let trsValue=avg(trs)

document.getElementById("trs").innerText=trsValue+" %"
document.getElementById("disp").innerText=avg(disp)+" %"
document.getElementById("perf").innerText=avg(perf)+" %"
document.getElementById("qual").innerText=avg(qual)+" %"

colorKPI("trs",trsValue,75,85)
colorKPI("disp",avg(disp),85,95)
colorKPI("perf",avg(perf),80,90)
colorKPI("qual",avg(qual),95,98)

let trsChart=new Chart(document.getElementById("trsChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"TRS %",data:trs}]}
})

let dpqChart=new Chart(document.getElementById("dpqChart"),{
type:"line",
data:{
labels:labels,
datasets:[
{label:"Disponibilité",data:disp},
{label:"Performance",data:perf},
{label:"Qualité",data:qual}
]}
})

new Chart(document.getElementById("gaugeTRS"),{
type:"doughnut",
data:{labels:["TRS","Reste"],
datasets:[{data:[trsValue,100-trsValue],backgroundColor:["green","#e0e0e0"]}]},
options:{rotation:-90,circumference:180,plugins:{legend:{display:false}}}
})

new Chart(document.getElementById("pareto"),{
type:"bar",
data:{
labels:["Arrêt machine","Micro-arrêts","Réglages","Vitesse réduite","Défauts"],
datasets:[{label:"Impact %",data:[25,20,18,15,10]}]
}
})

new Chart(document.getElementById("machineChart"),{
type:"bar",
data:{labels:["Machine A","Machine B","Machine C","Machine D","Machine E"],
datasets:[{label:"TRS %",data:[82,78,88,74,91]}]}
})

new Chart(document.getElementById("shiftChart"),{
type:"bar",
data:{labels:["Matin","Soir","Nuit"],
datasets:[{label:"TRS %",data:[84,79,73]}]}
})

let forecast=[...trs,80,82,85]
let forecastLabels=[...labels,"Prévision1","Prévision2","Prévision3"]

new Chart(document.getElementById("forecast"),{
type:"line",
data:{labels:forecastLabels,datasets:[{label:"Prévision TRS %",data:forecast}]}
})

const table=document.querySelector("#dataTable tbody")

for(let i=0;i<trs.length;i++){

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${trs[i]}</td>
<td>${disp[i]}</td>
<td>${perf[i]}</td>
<td>${qual[i]}</td>
</tr>
`
}

function filterWeek(){

let week=document.getElementById("weekFilter").value

let start=0
let end=31

if(week==1){start=0;end=7}
if(week==2){start=7;end=14}
if(week==3){start=14;end=21}
if(week==4){start=21;end=31}

trsChart.data.labels=labels.slice(start,end)
trsChart.data.datasets[0].data=trs.slice(start,end)

trsChart.update()

}

function exportExcel(){
let wb=XLSX.utils.table_to_book(document.getElementById("dataTable"))
XLSX.writeFile(wb,"TRS_dashboard.xlsx")
}

function exportCSV(){
let wb=XLSX.utils.table_to_book(document.getElementById("dataTable"))
XLSX.writeFile(wb,"TRS_dashboard.csv")
}

</script>

</body>
</html>
