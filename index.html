<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Centre de contrôle industriel TRS V17.0</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:30px;
}

h1{text-align:center}

.topbar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
margin-bottom:30px;
}

button{
padding:10px 15px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

select{
padding:8px;
border-radius:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.legend span{
margin-right:15px;
font-weight:bold;
}

.red{color:red}
.orange{color:orange}
.green{color:lime}

.machineGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.machine{
padding:20px;
border-radius:10px;
background:#1e293b;
text-align:center;
}

.ok{background:#15803d}
.warn{background:#ea580c}
.fail{background:#dc2626}

.chart{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:30px;
}

.aiBox{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
margin-top:30px;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
}

</style>

</head>

<body>

<h1>Centre de contrôle industriel – TRS</h1>

<div class="topbar">

<div>

<select id="versionSelect" onchange="changeVersion()">

<option value="17">Version V17.0</option>
<option value="16">Version V16.0</option>
<option value="15">Version V15.0</option>
<option value="14">Version V14.0</option>
<option value="13">Version V13.0</option>

</select>

<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportExcel()">Export Excel</button>

</div>

<div id="qrcode"></div>

</div>

<div class="legend">

<span class="red">TRS < 70%</span>
<span class="orange">70-85%</span>
<span class="green">> 85%</span>

</div>

<div class="grid">

<div class="card">
<h2 id="trs">--</h2>
TRS
</div>

<div class="card">
<h2 id="production">0</h2>
Production
</div>

</div>

<h2>Machines production</h2>

<div class="machineGrid">

<div class="machine" id="m1">Machine A<br><span id="p1">0</span></div>
<div class="machine" id="m2">Machine B<br><span id="p2">0</span></div>
<div class="machine" id="m3">Machine C<br><span id="p3">0</span></div>
<div class="machine" id="m4">Machine D<br><span id="p4">0</span></div>

</div>

<div class="aiBox">

<h3>IA maintenance prédictive</h3>

<p id="aiMachine"></p>
<p id="aiCause"></p>

<ul id="aiAction"></ul>

</div>

<div class="chart">

<canvas id="pareto"></canvas>

</div>

<div class="chart">

<canvas id="shift"></canvas>

</div>

<div class="chart">

<canvas id="history"></canvas>

</div>

<table id="dataTable">

<thead>

<tr>
<th>Mois</th>
<th>TRS</th>
<th>Disponibilité</th>
<th>Qualité</th>
</tr>

</thead>

<tbody></tbody>

</table>

<script>

let production=[0,0,0,0]

function simulateFactory(){

let total=0

production.forEach((v,i)=>{

let machine=document.getElementById("m"+(i+1))
let r=Math.random()

machine.classList.remove("ok","warn","fail")

if(r<0.7){

machine.classList.add("ok")
production[i]+=Math.floor(Math.random()*5)

}

else if(r<0.9){

machine.classList.add("warn")
production[i]+=1

}

else{

machine.classList.add("fail")

}

document.getElementById("p"+(i+1)).innerText=production[i]

total+=production[i]

})

document.getElementById("production").innerText=total

let trs=(Math.random()*20+75).toFixed(1)

document.getElementById("trs").innerText=trs+"%"

}

function predictiveAI(){

const machines=["Machine A","Machine B","Machine C","Machine D"]

const causes=[
"Surchauffe moteur",
"Vibration anormale",
"Usure roulement"
]

let m=machines[Math.floor(Math.random()*machines.length)]
let c=causes[Math.floor(Math.random()*causes.length)]

document.getElementById("aiMachine").innerText="Machine à risque : "+m
document.getElementById("aiCause").innerText="Cause probable : "+c

}

function changeVersion(){

let v=document.getElementById("versionSelect").value

alert("Affichage simulation version V"+v)

}

function exportCSV(){

let table=document.getElementById("dataTable")

let csv=[]

for(let row of table.rows){

let cols=row.querySelectorAll("td,th")

let rowData=[]

cols.forEach(c=>rowData.push(c.innerText))

csv.push(rowData.join(","))

}

let blob=new Blob([csv.join("\n")],{type:"text/csv"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="production_trs.csv"

link.click()

}

function exportExcel(){

let table=document.getElementById("dataTable")

let wb=XLSX.utils.table_to_book(table)

XLSX.writeFile(wb,"production_trs.xlsx")

}

function generateTable(){

let tbody=document.querySelector("#dataTable tbody")

for(let i=1;i<=12;i++){

let row="<tr>"

row+="<td>Mois "+i+"</td>"
row+="<td>"+(80+i/2).toFixed(1)+"%</td>"
row+="<td>"+(90+i/3).toFixed(1)+"%</td>"
row+="<td>"+(95+i/5).toFixed(1)+"%</td>"

row+="</tr>"

tbody.innerHTML+=row

}

}

window.onload=function(){

generateTable()

new QRCode(document.getElementById("qrcode"),{
text:window.location.href,
width:110,
height:110
})

new Chart(document.getElementById("pareto"),{
type:"bar",
data:{
labels:["Arrêts","Micro","Vitesse","Réglage"],
datasets:[{label:"Pareto des pertes",data:[30,20,15,10]}]
}
})

new Chart(document.getElementById("shift"),{
type:"bar",
data:{
labels:["Jour","Soir","Nuit"],
datasets:[{label:"TRS par quart",data:[88,81,76]}]
}
})

new Chart(document.getElementById("history"),{
type:"line",
data:{
labels:["Jan","Fev","Mar","Avr","Mai"],
datasets:[{label:"Historique TRS",data:[80,82,85,87,89]}]
}
})

setInterval(simulateFactory,2000)
setInterval(predictiveAI,8000)

}

</script>

</body>
</html>
