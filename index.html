<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard TRS Industriel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-gauge"></script>

<style>

body{
font-family: "Segoe UI";
background:#eef2f7;
margin:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
font-size:32px;
margin:0;
}

.chart{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.tables{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

th{
background:#2c3e50;
color:white;
}

.good{color:green;font-weight:bold;}
.medium{color:orange;font-weight:bold;}
.bad{color:red;font-weight:bold;}

</style>
</head>

<body>

<h1>Dashboard TRS – Performance Industrielle</h1>

<div class="grid">

<div class="card">
<h2 id="trs"></h2>
<p>TRS moyen</p>
</div>

<div class="card">
<h2 id="disp"></h2>
<p>Disponibilité</p>
</div>

<div class="card">
<h2 id="perf"></h2>
<p>Performance</p>
</div>

<div class="card">
<h2 id="qual"></h2>
<p>Qualité</p>
</div>

</div>

<div class="chart">
<canvas id="gauge"></canvas>
</div>

<div class="chart">
<canvas id="trsChart"></canvas>
</div>

<div class="chart">
<canvas id="dpqChart"></canvas>
</div>

<div class="chart">
<canvas id="prodChart"></canvas>
</div>

<div class="tables">

<div>
<h3>Top Performance TRS</h3>
<table id="topTable">
<tr>
<th>Date</th>
<th>TRS %</th>
</tr>
</table>
</div>

<div>
<h3>Pires journées TRS</h3>
<table id="badTable">
<tr>
<th>Date</th>
<th>TRS %</th>
</tr>
</table>
</div>

</div>

<script>

const data=[
{date:"01/01",disp:87.5,perf:83.33,qual:95,trs:69.27,pr:400,pt:480},
{date:"02/01",disp:98.96,perf:80.42,qual:96.63,trs:76.9,pr:386,pt:480},
{date:"03/01",disp:94.38,perf:91.88,qual:96.15,trs:83.36,pr:441,pt:480},
{date:"04/01",disp:91.88,perf:93.75,qual:97.11,trs:83.64,pr:450,pt:480},
{date:"05/01",disp:95.42,perf:92.29,qual:98.19,trs:86.47,pr:443,pt:480},
{date:"06/01",disp:99.17,perf:96.67,qual:97.2,trs:93.18,pr:464,pt:480},
{date:"07/01",disp:99.17,perf:97.08,qual:98.93,trs:95.24,pr:466,pt:480},
{date:"08/01",disp:95,perf:87.5,qual:97.62,trs:81.15,pr:420,pt:480},
{date:"09/01",disp:90,perf:96.67,qual:98.71,trs:85.88,pr:464,pt:480},
{date:"10/01",disp:93.75,perf:93.54,qual:94.88,trs:83.2,pr:449,pt:480}
];

const labels=data.map(d=>d.date);

const trs=data.map(d=>d.trs);
const disp=data.map(d=>d.disp);
const perf=data.map(d=>d.perf);
const qual=data.map(d=>d.qual);
const pr=data.map(d=>d.pr);
const pt=data.map(d=>d.pt);

function avg(arr){
return (arr.reduce((a,b)=>a+b)/arr.length).toFixed(1);
}

document.getElementById("trs").innerText=avg(trs)+" %";
document.getElementById("disp").innerText=avg(disp)+" %";
document.getElementById("perf").innerText=avg(perf)+" %";
document.getElementById("qual").innerText=avg(qual)+" %";

const trsAvg=parseFloat(avg(trs));

new Chart(document.getElementById("gauge"),{
type:'doughnut',
data:{
datasets:[{
data:[trsAvg,100-trsAvg]
}]
},
options:{
rotation:-90,
circumference:180,
plugins:{
legend:{display:false}
}
}
});

new Chart(document.getElementById("trsChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"TRS %",
data:trs,
tension:0.3
}]
}
});

new Chart(document.getElementById("dpqChart"),{
type:"line",
data:{
labels:labels,
datasets:[
{label:"Disponibilité",data:disp},
{label:"Performance",data:perf},
{label:"Qualité",data:qual}
]
}
});

new Chart(document.getElementById("prodChart"),{
type:"bar",
data:{
labels:labels,
datasets:[
{label:"Production réelle",data:pr},
{label:"Production théorique",data:pt}
]
}
});

const sorted=[...data].sort((a,b)=>b.trs-a.trs);
const top=sorted.slice(0,5);
const bad=sorted.slice(-5);

top.forEach(d=>{
document.getElementById("topTable").innerHTML+=
`<tr><td>${d.date}</td><td class="good">${d.trs}</td></tr>`
})

bad.forEach(d=>{
document.getElementById("badTable").innerHTML+=
`<tr><td>${d.date}</td><td class="bad">${d.trs}</td></tr>`
})

</script>

</body>
</html>
