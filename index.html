<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard TRS Production</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
font-size:32px;
margin:0;
}

.chart{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.tables{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

.good{color:green;font-weight:bold;}
.bad{color:red;font-weight:bold;}

</style>
</head>

<body>

<h1>Dashboard TRS – Performance Production</h1>

<div class="grid">

<div class="card">
<h2 id="trs"></h2>
<p>TRS moyen</p>
</div>

<div class="card">
<h2 id="disp"></h2>
<p>Disponibilité</p>
</div>

<div class="card">
<h2 id="perf"></h2>
<p>Performance</p>
</div>

<div class="card">
<h2 id="qual"></h2>
<p>Qualité</p>
</div>

</div>

<div class="chart">
<canvas id="trsChart"></canvas>
</div>

<div class="chart">
<canvas id="dpqChart"></canvas>
</div>

<div class="chart">
<canvas id="prodChart"></canvas>
</div>

<div class="tables">

<div>
<h3>Top 5 TRS</h3>
<table id="topTable">
<tr>
<th>Date</th>
<th>TRS %</th>
</tr>
</table>
</div>

<div>
<h3>TRS les plus faibles</h3>
<table id="badTable">
<tr>
<th>Date</th>
<th>TRS %</th>
</tr>
</table>
</div>

</div>

<script>

const data=[

{date:"01/01",disp:87.50,perf:83.33,qual:95.00,trs:69.27,pr:400,pt:480},
{date:"02/01",disp:98.96,perf:80.42,qual:96.63,trs:76.90,pr:386,pt:480},
{date:"03/01",disp:94.38,perf:91.88,qual:96.15,trs:83.36,pr:441,pt:480},
{date:"04/01",disp:91.88,perf:93.75,qual:97.11,trs:83.64,pr:450,pt:480},
{date:"05/01",disp:95.42,perf:92.29,qual:98.19,trs:86.47,pr:443,pt:480},
{date:"06/01",disp:99.17,perf:96.67,qual:97.20,trs:93.18,pr:464,pt:480},
{date:"07/01",disp:99.17,perf:97.08,qual:98.93,trs:95.24,pr:466,pt:480},
{date:"08/01",disp:95.00,perf:87.50,qual:97.62,trs:81.15,pr:420,pt:480},
{date:"09/01",disp:90.00,perf:96.67,qual:98.71,trs:85.88,pr:464,pt:480},
{date:"10/01",disp:93.75,perf:93.54,qual:94.88,trs:83.20,pr:449,pt:480},
{date:"11/01",disp:90.83,perf:84.58,qual:99.75,trs:76.64,pr:406,pt:480},
{date:"12/01",disp:91.04,perf:89.79,qual:97.68,trs:79.85,pr:431,pt:480},
{date:"13/01",disp:88.13,perf:86.88,qual:99.04,trs:75.82,pr:417,pt:480},
{date:"14/01",disp:99.58,perf:81.67,qual:98.21,trs:79.87,pr:392,pt:480},
{date:"15/01",disp:100.00,perf:83.33,qual:97.50,trs:81.25,pr:400,pt:480},
{date:"16/01",disp:98.13,perf:81.46,qual:99.74,trs:79.73,pr:391,pt:480},
{date:"17/01",disp:94.38,perf:81.46,qual:94.37,trs:72.55,pr:391,pt:480},
{date:"18/01",disp:90.83,perf:93.54,qual:98.44,trs:83.64,pr:449,pt:480},
{date:"19/01",disp:86.04,perf:98.13,qual:99.36,trs:83.89,pr:471,pt:480},
{date:"20/01",disp:92.50,perf:96.88,qual:99.14,trs:88.84,pr:465,pt:480},
{date:"21/01",disp:98.75,perf:87.71,qual:98.10,trs:84.97,pr:421,pt:480},
{date:"22/01",disp:83.54,perf:94.17,qual:95.80,trs:75.36,pr:452,pt:480},
{date:"23/01",disp:90.00,perf:84.79,qual:96.07,trs:73.31,pr:407,pt:480},
{date:"24/01",disp:98.13,perf:89.17,qual:94.63,trs:82.79,pr:428,pt:480},
{date:"25/01",disp:100.00,perf:81.67,qual:97.19,trs:79.38,pr:392,pt:480},
{date:"26/01",disp:97.92,perf:82.29,qual:94.94,trs:76.50,pr:395,pt:480},
{date:"27/01",disp:90.42,perf:80.42,qual:99.74,trs:72.52,pr:386,pt:480},
{date:"28/01",disp:92.50,perf:81.88,qual:94.66,trs:71.69,pr:393,pt:480},
{date:"29/01",disp:93.33,perf:93.75,qual:96.00,trs:84.00,pr:450,pt:480},
{date:"30/01",disp:94.38,perf:82.71,qual:97.98,trs:76.48,pr:397,pt:480},
{date:"31/01",disp:83.75,perf:90.63,qual:96.55,trs:73.28,pr:435,pt:480}

];

const labels=data.map(d=>d.date);

const trs=data.map(d=>d.trs);
const disp=data.map(d=>d.disp);
const perf=data.map(d=>d.perf);
const qual=data.map(d=>d.qual);
const pr=data.map(d=>d.pr);
const pt=data.map(d=>d.pt);

function avg(arr){
return (arr.reduce((a,b)=>a+b)/arr.length).toFixed(1);
}

document.getElementById("trs").innerText=avg(trs)+" %";
document.getElementById("disp").innerText=avg(disp)+" %";
document.getElementById("perf").innerText=avg(perf)+" %";
document.getElementById("qual").innerText=avg(qual)+" %";

new Chart(document.getElementById("trsChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"TRS %",
data:trs,
tension:0.3
}]
}
});

new Chart(document.getElementById("dpqChart"),{
type:"line",
data:{
labels:labels,
datasets:[
{label:"Disponibilité",data:disp},
{label:"Performance",data:perf},
{label:"Qualité",data:qual}
]
}
});

new Chart(document.getElementById("prodChart"),{
type:"bar",
data:{
labels:labels,
datasets:[
{label:"Production réelle",data:pr},
{label:"Production théorique",data:pt}
]
}
});

const sorted=[...data].sort((a,b)=>b.trs-a.trs);

const top=sorted.slice(0,5);
const bad=sorted.slice(-5);

top.forEach(d=>{
document.getElementById("topTable").innerHTML+=
`<tr><td>${d.date}</td><td class="good">${d.trs}</td></tr>`
});

bad.forEach(d=>{
document.getElementById("badTable").innerHTML+=
`<tr><td>${d.date}</td><td class="bad">${d.trs}</td></tr>`
});

</script>

</body>
</html>
